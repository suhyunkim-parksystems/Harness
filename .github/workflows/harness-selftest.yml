# Harness selftest gate — UPSTREAM (harness) OWNED.
#
# Scope: the harness engine only (.ai/selftests, 375 tests + the harness_core
# pyright type gate). It does NOT build or test the ISE example app under
# src/ or tests/ — that is each downstream project's own concern, driven by
# .project/harness.config.json and a separate, fork-owned project-ci.yml.
#
# Fork policy: do NOT edit this file in a fork. Keeping it upstream-owned means
# `git pull upstream` updates it conflict-free. Put project CI in its own file.
#
# Extraction note: this repo keeps the harness under .ai/, so the commands below
# carry an `.ai/` prefix. If you later make .ai/ the repository root, drop the
# `.ai/` from the paths filter and the run command (`python harness.py selftest`).

name: Harness Selftest

on:
  push:
    paths:
      - '.ai/**'
      - '.github/workflows/harness-selftest.yml'
  pull_request:
    paths:
      - '.ai/**'
      - '.github/workflows/harness-selftest.yml'
  workflow_dispatch: {}

# A newer push on the same ref cancels an in-flight run — saves CI minutes.
concurrency:
  group: harness-selftest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    name: harness_core selftest + pyright gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Runtime deps the harness imports (python-docx, PyMuPDF).
          pip install -r .ai/requirements.txt
          # Pinned so the static-type gate is deterministic: an unpinned pyright
          # could start flagging new diagnostics on code that did not change.
          pip install pyright==1.1.410

      - name: Run harness selftest (375 tests + pyright gate)
        # AI_DIR is resolved from the script's own location, so this is
        # cwd-independent and runs from the repo root unchanged.
        run: python .ai/harness.py selftest
